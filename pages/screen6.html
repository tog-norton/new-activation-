<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norton – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Browser bar ── */
    .browser-bar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .bar-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #6b7280;
      display: flex;
      align-items: center;
      padding: 2px;
    }

    .bar-btn svg { width: 18px; height: 18px; }

    .bar-url {
      flex: 1;
      background: #f3f4f6;
      border-radius: 16px;
      padding: 5px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .bar-url svg { width: 11px; height: 11px; color: #6b7280; flex-shrink: 0; }
    .bar-url span { font-size: 11.5px; color: #374151; font-weight: 500; }

    .bar-actions { display: flex; gap: 12px; }

    /* ── Page content ── */
    .page {
      flex: 1;
      overflow-y: auto;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
    }

    /* Top white section */
    .top-section {
      background: #fff;
      padding: 28px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 1px solid #e5e7eb;
    }

    /* Norton logo */
    .norton-logo {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
    }

    .logo-check {
      width: 30px;
      height: 30px;
    }

    .logo-wordmark {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      letter-spacing: -.3px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #111;
      margin-bottom: 24px;
      align-self: flex-start;
      width: 100%;
    }

    /* Input fields */
    .field {
      width: 100%;
      margin-bottom: 18px;
      position: relative;
    }

    .field label {
      display: block;
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid #d1d5db;
      background: transparent;
      font-size: 15px;
      padding: 6px 32px 6px 0;
      outline: none;
      color: #111;
      transition: border-color .2s;
      font-family: inherit;
    }

    .field input:focus { border-bottom-color: #fbbf24; }

    .field-icon {
      position: absolute;
      right: 0;
      bottom: 7px;
      color: #9ca3af;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      display: flex;
    }

    .field-icon svg { width: 19px; height: 19px; }

    /* Forgot password */
    .forgot {
      align-self: flex-end;
      font-size: 13px;
      color: #2563eb;
      font-weight: 500;
      text-decoration: none;
      margin-top: -8px;
      margin-bottom: 28px;
    }

    /* Sign in button */
    .signin-btn {
      width: 100%;
      background: #febd11;
      color: #000;
      border: none;
      border-radius: 9999px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 20px;
      font-family: inherit;
      transition: background .2s, transform .15s;
    }

    .signin-btn:hover { background: #e6ac00; }
    .signin-btn:active { transform: scale(.97); }

    /* Divider */
    .divider {
      position: relative;
      text-align: center;
      width: 100%;
      margin-bottom: 20px;
    }

    .divider::before {
      content: '';
      position: absolute;
      inset: 50% 0 auto;
      height: 1px;
      background: #e5e7eb;
    }

    .divider span {
      position: relative;
      background: #fff;
      padding: 0 12px;
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: .7px;
    }

    /* Social buttons */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      width: 100%;
    }

    .social-btn {
      width: 50px;
      height: 50px;
      border: 1px solid #e5e7eb;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, transform .15s;
    }

    .social-btn:hover { background: #f9fafb; }
    .social-btn:active { transform: scale(.92); }
    .social-btn svg { width: 22px; height: 22px; }

    /* ── Bottom grey section ── */
    .bottom-section {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .create-account-btn {
      width: 100%;
      background: #fff;
      color: #111;
      border: 1.5px solid #d1d5db;
      border-radius: 9999px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .2s, transform .15s;
    }

    .create-account-btn:hover { border-color: #9ca3af; }
    .create-account-btn:active { transform: scale(.97); }

    .terms {
      font-size: 10px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.6;
      padding: 0 8px;
    }

    .terms a { color: #6b7280; text-decoration: underline; }

    /* ── Footer links ── */
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 12px 24px 24px;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-size: 11px;
      color: #9ca3af;
      text-decoration: none;
    }

    .footer-links a:hover { color: #6b7280; }
  </style>
</head>
<body>

  <!-- Browser bar -->
  <div class="browser-bar">
    <button class="bar-btn" onclick="window.parent.postMessage({action:'back-from-login'},'*')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>

    <div class="bar-url">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
      </svg>
      <span>login.norton.com</span>
    </div>

    <div class="bar-actions">
      <button class="bar-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/>
        </svg>
      </button>
      <button class="bar-btn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 7a1 1 0 100 2 1 1 0 000-2zm0 4a1 1 0 100 2 1 1 0 000-2zm0 4a1 1 0 100 2 1 1 0 000-2z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="page">
    <!-- Top white section -->
    <div class="top-section">

      <!-- Norton logo -->
      <div class="norton-logo">
        <svg class="logo-check" viewBox="0 0 30 30">
          <circle cx="15" cy="15" r="14" fill="none" stroke="#111" stroke-width="1.5"/>
          <path d="M9 15l4.5 4.5L21 10" fill="none" stroke="#febd11" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-wordmark">norton</span>
      </div>

      <h1>Masuk</h1>

      <!-- Email -->
      <div class="field">
        <label for="login-email">Alamat email</label>
        <input type="email" id="login-email" placeholder="" autocomplete="email" />
        <button class="field-icon" tabindex="-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </button>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="login-password">Kata sandi</label>
        <input type="password" id="login-password" placeholder="" autocomplete="current-password" />
        <button class="field-icon" id="eye-toggle" tabindex="-1">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <a class="forgot" href="#">Lupa kata sandi?</a>

      <button class="signin-btn" id="signin-btn">Masuk</button>

      <!-- Divider -->
      <div class="divider"><span>atau lanjutkan dengan</span></div>

      <!-- Social -->
      <div class="social-row">
        <!-- Google -->
        <button class="social-btn">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>
        <!-- Apple -->
        <button class="social-btn">
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22">
            <path d="M17.05 20.28c-.96.95-2.44 1.78-4.14 1.78-2.3 0-3.3-1.5-5.33-1.5-2.06 0-3.28 1.47-5.32 1.47-1.43 0-2.83-.75-3.74-2.08-1.7-2.46-1.55-7.1.33-9.52.88-1.12 2.15-1.85 3.52-1.85 1.4 0 2.3.9 3.4.9 1.06 0 2.33-.9 3.6-.9 1.15 0 2.45.6 3.3 1.5-2.72 1.62-2.23 5.56.55 6.94-.6 1.46-1.54 2.86-2.27 3.26zM12.03 5.43c-.02-2.13 1.76-3.9 3.7-4.03.2 2.37-2.14 4.14-3.7 4.03z"/>
          </svg>
        </button>
        <!-- Microsoft -->
        <button class="social-btn">
          <svg viewBox="0 0 23 23" width="22" height="22">
            <path d="M0 0h23v23H0z" fill="#f3f3f3"/>
            <path d="M1 1h10v10H1z" fill="#f35325"/>
            <path d="M12 1h10v10H12z" fill="#81bc06"/>
            <path d="M1 12h10v10H1z" fill="#05a6f0"/>
            <path d="M12 12h10v10H12z" fill="#ffba08"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Bottom grey section -->
    <div class="bottom-section">
      <button class="create-account-btn" onclick="window.parent.postMessage({action:'go-to-register'},'*')">
        Buat Akun Baru
      </button>

      <p class="terms">
        Dengan masuk, Anda menyetujui
        <a href="#">Ketentuan Layanan</a> dan
        <a href="#">Kebijakan Privasi</a> NortonLifeLock.
      </p>
    </div>

    <!-- Footer links -->
    <div class="footer-links">
      <a href="#">Privasi</a>
      <a href="#">Ketentuan</a>
      <a href="#">Aksesibilitas</a>
      <a href="#">Cookie</a>
    </div>
  </div>

  <script>
    // Toggle password visibility
    document.getElementById('eye-toggle').addEventListener('click', () => {
      const inp = document.getElementById('login-password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    });
  </script>
</body>
</html>
