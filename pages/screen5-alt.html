<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Norton – Perangkat Terlindungi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f6f7f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Nav */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #fff;
      border-bottom: 1px solid #f1f5f9;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .norton-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: #febd11;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon .material-symbols-outlined { font-size: 18px; color: #000; }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -.3px;
    }

    .help-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #002d5b;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      transition: background .2s;
    }

    .help-btn:hover { background: #f1f5f9; }
    .help-btn .material-symbols-outlined { font-size: 22px; }

    /* Active banner */
    .active-banner {
      background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
      border-bottom: 1px solid #86efac;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      animation: bannerDrop .5s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes bannerDrop {
      from { opacity: 0; transform: translateY(-100%); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .active-banner .material-symbols-outlined {
      color: #166534;
      font-size: 16px;
    }

    .banner-text {
      font-size: 11px;
      font-weight: 600;
      color: #166534;
    }

    .banner-sep { opacity: .6; margin: 0 3px; }

    .banner-exp {
      font-size: 10px;
      font-weight: 500;
      opacity: .85;
    }

    /* Main */
    main {
      flex: 1;
      padding: 20px 20px 28px;
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    /* Hero Section */
    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 0;
      width: 100%;
    }

    .shield-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    /* Animated background rings - Green theme */
    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      animation: pulse-green 2s ease-in-out infinite;
    }

    .pulse-ring-1 {
      width: 160px;
      height: 160px;
      background: rgba(34, 197, 94, 0.1);
      animation-delay: 0s;
    }

    .pulse-ring-2 {
      width: 120px;
      height: 120px;
      background: rgba(34, 197, 94, 0.2);
      animation-delay: .4s;
    }

    @keyframes pulse-green {
      0%, 100% {
        transform: scale(1);
        opacity: .6;
      }
      50% {
        transform: scale(1.08);
        opacity: .9;
      }
    }

    .shield-circle {
      position: relative;
      z-index: 2;
      width: 100px;
      height: 100px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(34, 197, 94, .25);
      animation: float-shield 3s ease-in-out infinite;
    }

    @keyframes float-shield {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .shield-icon {
      font-size: 52px;
      color: #16a34a;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
    }

    .shield-badge {
      position: absolute;
      bottom: 6px;
      z-index: 3;
      background: #002d5b;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 3px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }

    .shield-badge .material-symbols-outlined { font-size: 12px; }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
      text-align: center;
      line-height: 1.3;
      max-width: 300px;
    }

    .subtitle {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 0;
    }

    /* CTA Section - Centered and optimized for touch */
    .cta-section {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cta-btn {
      width: 100%;
      background: #FFD700;
      color: #0f172a;
      border: none;
      border-radius: 12px;
      padding: 18px 20px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 20px -5px rgba(255, 215, 0, 0.5);
      transition: all .3s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0px;
      animation: pulse-gold-shadow 2s ease-in-out infinite;
      line-height: 1.2;
    }

    @keyframes pulse-gold-shadow {
      0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
    }

    .cta-btn:hover {
      background: #FFE14D;
      transform: scale(1.02);
    }

    .cta-btn:active {
      transform: scale(0.98);
    }

    .cta-btn .material-symbols-outlined {
      font-size: 24px;
      font-weight: 700;
    }

    /* Decorative elements */
    .decorative-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .08;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: #22c55e;
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      width: 300px;
      height: 300px;
      background: #FFD700;
      bottom: -80px;
      right: -80px;
    }
  </style>
</head>
<body>

  <!-- Decorative background -->
  <div class="decorative-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <nav class="top-nav">
    <div class="norton-brand">
      <div class="brand-icon">
        <span class="material-symbols-outlined">shield_lock</span>
      </div>
      <span class="brand-name">Norton</span>
    </div>
    <button class="help-btn" onclick="window.parent.postMessage({action:'open-support'},'*')">
      <span class="material-symbols-outlined">help</span>
    </button>
  </nav>

  <!-- Active banner -->
  <div class="active-banner">
    <span class="material-symbols-outlined">check_circle</span>
    <span class="banner-text">
      Langganan Aktif
      <span class="banner-sep">|</span>
      <span class="banner-exp">Berakhir pada: 12 Des 2025</span>
    </span>
  </div>

  <main>
    <!-- Hero Section -->
    <div class="hero-section">
      <div class="shield-wrap">
        <div class="pulse-ring pulse-ring-1"></div>
        <div class="pulse-ring pulse-ring-2"></div>
        <div class="shield-circle">
          <span class="material-symbols-outlined shield-icon">shield</span>
        </div>
        <div class="shield-badge">
          <span class="material-symbols-outlined">verified</span>
          AMAN
        </div>
      </div>

      <h1>Perangkat Terlindungi</h1>
      <p class="subtitle">
        Perlindungan Anda aktif dan berjalan dengan optimal. Perangkat Anda aman dari ancaman.
      </p>
    </div>

    <!-- CTA Section -->
    <div class="cta-section">
      <button class="cta-btn" id="login-btn">
        <span>MASUK</span>
        <span class="material-symbols-outlined">login</span>
      </button>
    </div>
  </main>

  <script>
    document.getElementById('login-btn').addEventListener('click', () => {
      window.parent.postMessage({ action: 'login' }, '*');
    });
  </script>
</body>
</html>
