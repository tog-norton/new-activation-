<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Norton – Aktivasi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f6f7f8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Nav */
    .top-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #fff;
      border-bottom: 1px solid #f1f5f9;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .norton-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      background: #febd11;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon .material-symbols-outlined { font-size: 18px; color: #000; }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -.3px;
    }

    .help-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #002d5b;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      transition: background .2s;
    }

    .help-btn:hover { background: #f1f5f9; }
    .help-btn .material-symbols-outlined { font-size: 22px; }

    /* Main */
    main {
      flex: 1;
      padding: 20px 20px 28px;
      max-width: 420px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    /* Hero Section */
    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 0;
      width: 100%;
    }

    .shield-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    /* Animated background rings */
    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      animation: pulse-gold 2s ease-in-out infinite;
    }

    .pulse-ring-1 {
      width: 160px;
      height: 160px;
      background: rgba(255, 215, 0, 0.1);
      animation-delay: 0s;
    }

    .pulse-ring-2 {
      width: 120px;
      height: 120px;
      background: rgba(255, 215, 0, 0.2);
      animation-delay: .4s;
    }

    @keyframes pulse-gold {
      0%, 100% {
        transform: scale(1);
        opacity: .6;
      }
      50% {
        transform: scale(1.08);
        opacity: .9;
      }
    }

    .shield-circle {
      position: relative;
      z-index: 2;
      width: 100px;
      height: 100px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(255, 215, 0, .25);
      animation: float-shield 3s ease-in-out infinite;
    }

    @keyframes float-shield {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .shield-icon {
      font-size: 52px;
      color: #FFD700;
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
      text-align: center;
      line-height: 1.3;
      max-width: 300px;
    }

    .highlight-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 10px;
      width: 100%;
      max-width: 300px;
      border: 1px solid #e2e8f0;
    }

    .highlight-text {
      font-size: 11px;
      color: #111418;
      font-weight: 600;
      text-align: center;
      line-height: 1.5;
    }

    .highlight-text .date-badge {
      background: #FFD700;
      color: #0f172a;
      padding: 2px 7px;
      border-radius: 5px;
      font-weight: 700;
      display: inline-block;
      font-size: 11px;
    }

    .subtitle {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      line-height: 1.6;
      max-width: 300px;
      margin-bottom: 0;
    }

    /* CTA Section - Centered and optimized for touch */
    .cta-section {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cta-btn {
      width: 100%;
      background: #FFD700;
      color: #0f172a;
      border: none;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 20px -5px rgba(255, 215, 0, 0.5);
      transition: all .3s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0px;
      animation: pulse-gold-shadow 2s ease-in-out infinite;
    }

    @keyframes pulse-gold-shadow {
      0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(255, 215, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
    }

    .cta-btn:hover {
      background: #FFE14D;
      transform: scale(1.02);
    }

    .cta-btn:active {
      transform: scale(0.98);
    }

    .cta-btn .material-symbols-outlined {
      font-size: 22px;
      font-weight: 700;
      animation: bounce-x 1s ease-in-out infinite;
    }

    @keyframes bounce-x {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }

    /* Decorative elements */
    .decorative-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .08;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: #FFD700;
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      width: 300px;
      height: 300px;
      background: #FFD700;
      bottom: -80px;
      right: -80px;
    }
  </style>
</head>
<body>

  <!-- Decorative background -->
  <div class="decorative-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <nav class="top-nav">
    <div class="norton-brand">
      <div class="brand-icon">
        <span class="material-symbols-outlined">shield_lock</span>
      </div>
      <span class="brand-name">Norton</span>
    </div>
    <button class="help-btn" onclick="window.parent.postMessage({action:'open-support'},'*')">
      <span class="material-symbols-outlined">help</span>
    </button>
  </nav>

  <main>
    <!-- Hero Section -->
    <div class="hero-section">
      <div class="shield-wrap">
        <div class="pulse-ring pulse-ring-1"></div>
        <div class="pulse-ring pulse-ring-2"></div>
        <div class="shield-circle">
          <span class="material-symbols-outlined shield-icon">shield_with_heart</span>
        </div>
      </div>

      <h1>Anda telah mendapatkan layanan Norton 360 (30 Hari).</h1>

      <div class="highlight-box">
        <p class="highlight-text">
          Masa aktif layanan berlaku hingga <span class="date-badge">22 Maret 2026</span>.
        </p>
      </div>

      <p class="subtitle">
        Untuk melanjutkan proses aktivasi, silakan buat akun baru atau login menggunakan akun Norton yang sudah Anda miliki pada tahap berikutnya.
      </p>
    </div>

    <!-- CTA Section -->
    <div class="cta-section">
      <button class="cta-btn" id="activate-btn">
        <span style="line-height: 1.3; text-align: center;">
          AKTIVASI SEKARANG<br>UNDUH &amp; INSTAL
        </span>
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </main>

  <script>
    // Saat sudah activated, tombol mengarah ke login bukan activate-now
    document.getElementById('activate-btn').addEventListener('click', () => {
      window.parent.postMessage({ action: 'login' }, '*');
    });
  </script>
</body>
</html>
