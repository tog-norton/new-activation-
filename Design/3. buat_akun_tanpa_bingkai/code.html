<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Norton - Buat Akun</title>
<!-- Load Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-typography">
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');
    body {
      font-family: 'Roboto', sans-serif;
    }
  </style>
<style data-purpose="component-styles">
    /* Custom style for the disabled-looking button in the reference */
    .btn-submit-disabled {
      background-color: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
    }
    
    /* Input focus and placeholder styling */
    .norton-input:focus {
      border-color: #fbbf24;
      ring-color: #fbbf24;
    }

    /* Floating label simulation or standard bottom-border inputs */
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }
    
    .input-group label {
      font-size: 0.75rem;
      color: #6b7280;
      margin-bottom: 0.25rem;
      display: block;
    }

    .border-b-only {
      border: none;
      border-bottom: 1px solid #d1d5db;
      border-radius: 0;
      padding-left: 0;
      padding-right: 0;
    }
  </style>
</head>
<body class="bg-gray-50 flex min-h-screen">
<!-- BEGIN: MobileDeviceContainer -->
<!-- Mimics the mobile frame seen in the reference image -->
<main class="w-full max-w-[400px] bg-white relative overflow-hidden flex flex-col min-h-screen">
<!-- BEGIN: BrowserHeader -->
<header class="p-4 border-b border-gray-100 flex items-center justify-between bg-white">
<div class="flex items-center gap-4">
<button aria-label="Close" class="text-gray-600" type="button">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button aria-label="Settings" class="text-gray-600" type="button">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 14c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-4c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path>
</svg>
</button>
</div>
<div class="flex-1 px-2">
<div class="bg-gray-100 rounded-full px-4 py-1 flex items-center gap-2">
<div class="w-2 h-2 bg-gray-400 rounded-full"></div>
<span class="text-xs text-gray-500 truncate">my.norton.com</span>
</div>
</div>
<div class="flex items-center gap-4 text-gray-600">
<button><svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<button><svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
<button><svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
</div>
</header>
<!-- END: BrowserHeader -->
<!-- BEGIN: RegistrationFormContent -->
<div class="flex-1 overflow-y-auto px-6 pt-10 pb-8 flex flex-col items-center">
<!-- Norton Logo -->
<div class="mb-8 flex items-center justify-center gap-1">
<svg class="w-8 h-8 text-yellow-500" fill="currentColor" viewbox="0 0 24 24">
<circle cx="12" cy="12" fill="none" r="10" stroke="black" stroke-width="1.5"></circle>
<path d="M7 12l3 3 7-7" fill="none" stroke="currentColor" stroke-width="2.5"></path>
</svg>
<span class="text-2xl font-bold tracking-tight">norton</span>
</div>
<!-- Main Card Container -->
<div class="w-full bg-white border border-gray-100 shadow-sm rounded-3xl p-6 mb-6">
<h1 class="text-2xl font-bold text-gray-800 mb-8">Buat Akun</h1>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="input-group">
<label for="email">Alamat email *</label>
<input class="w-full border-b-only focus:ring-0 focus:border-yellow-500 text-sm py-1 outline-none" id="email" name="email" type="email"/>
</div>
<!-- Confirm Email Input -->
<div class="input-group">
<label for="confirm-email">Konfirmasi alamat email *</label>
<input class="w-full border-b-only focus:ring-0 focus:border-yellow-500 text-sm py-1 outline-none" id="confirm-email" name="confirm-email" type="email"/>
</div>
<!-- Password Input -->
<div class="input-group relative">
<label for="password">Buat kata sandi aman *</label>
<div class="relative">
<input class="w-full border-b-only focus:ring-0 focus:border-yellow-500 text-sm py-1 pr-10 outline-none" id="password" name="password" type="password"/>
<button class="absolute right-0 bottom-1 text-gray-500" type="button">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</button>
</div>
</div>
<!-- Region Selector -->
<div class="input-group">
<label for="region">Wilayah</label>
<div class="relative">
<select class="w-full border-b-only bg-transparent focus:ring-0 focus:border-yellow-500 text-sm py-1 pr-10 appearance-none outline-none" id="region" name="region">
<option value="indonesia">Indonesia</option>
<option value="us">United States</option>
</select>
<div class="absolute right-0 bottom-2 pointer-events-none">
<svg class="h-4 w-4 text-gray-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-3 rounded-full btn-submit-disabled font-semibold text-sm transition-colors duration-200" type="submit">
            Buat Akun
          </button>
</form>
<!-- Social Login Separator -->
<div class="relative my-8 text-center">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200"></div>
</div>
<div class="relative flex justify-center">
<span class="bg-white px-4 text-xs text-gray-500 uppercase tracking-wider">atau lanjutkan dengan</span>
</div>
</div>
<!-- Social Icons -->
<div class="flex justify-center gap-6 mb-8">
<!-- Google -->
<button class="w-12 h-12 flex items-center justify-center border border-gray-200 rounded-full hover:bg-gray-50 transition-colors">
<svg class="w-6 h-6" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</button>
<!-- Apple -->
<button class="w-12 h-12 flex items-center justify-center border border-gray-200 rounded-full hover:bg-gray-50 transition-colors">
<svg class="w-6 h-6" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.44 1.78-4.14 1.78-2.3 0-3.3-1.5-5.33-1.5-2.06 0-3.28 1.47-5.32 1.47-1.43 0-2.83-.75-3.74-2.08-1.7-2.46-1.55-7.1.33-9.52.88-1.12 2.15-1.85 3.52-1.85 1.4 0 2.3.9 3.4.9 1.06 0 2.33-.9 3.6-.9 1.15 0 2.45.6 3.3 1.5-2.72 1.62-2.23 5.56.55 6.94-.6 1.46-1.54 2.86-2.27 3.26zM12.03 5.43c-.02-2.13 1.76-3.9 3.7-4.03.2 2.37-2.14 4.14-3.7 4.03z"></path>
</svg>
</button>
<!-- Microsoft -->
<button class="w-12 h-12 flex items-center justify-center border border-gray-200 rounded-full hover:bg-gray-50 transition-colors">
<svg class="w-6 h-6" viewbox="0 0 23 23">
<path d="M0 0h23v23H0z" fill="#f3f3f3"></path>
<path d="M1 1h10v10H1z" fill="#f35325"></path>
<path d="M12 1h10v10H12z" fill="#81bc06"></path>
<path d="M1 12h10v10H1z" fill="#05a6f0"></path>
<path d="M12 12h10v10H12z" fill="#ffba08"></path>
</svg>
</button>
</div>
<!-- Privacy Terms -->
<p class="text-[10px] text-center text-gray-500 leading-relaxed px-4">
          Dengan mengklik Buat Akun, Anda telah membaca dan mengonfirmasi <br/>
<a class="text-blue-600 font-medium" href="#">Pernyataan Privasi Global</a> kami.
        </p>
</div>
<!-- Login Link -->
<div class="text-center text-sm">
<span class="text-gray-600">Bukan pengguna baru?</span>
<a class="text-blue-600 font-semibold ml-1 hover:underline" href="#">Masuk</a>
</div>
</div>
<!-- END: RegistrationFormContent -->
<!-- Mobile Navigation Bar (Indicator) -->
<div class="p-2 flex justify-center pb-3">
<div class="w-32 h-1.5 bg-gray-200 rounded-full"></div>
</div>
</main>
<!-- END: MobileDeviceContainer -->
</body></html>
